<!--
  Dr Fone — branded "Magic Link / OTP" email template.
  Paste this into: Supabase → Authentication → Email Templates → "Magic Link"
  (replace the whole message body). Supabase variables:
    {{ .Token }}            - the one-time code
    {{ .ConfirmationURL }}  - one-click sign-in link
-->
<div dir="rtl" style="font-family:Arial,Helvetica,sans-serif;background:#f4f6f6;padding:20px;margin:0">
  <div style="max-width:520px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb">
    <div style="background:#108c8b;color:#fff;padding:24px;text-align:center">
      <div style="font-size:22px;font-weight:bold">ד״ר פון</div>
      <div style="font-size:14px;opacity:.92;margin-top:4px">קוד התחברות לאתר</div>
    </div>
    <div style="padding:26px 24px">
      <p style="font-size:16px;color:#111;margin:0 0 6px">שלום,</p>
      <p style="font-size:15px;color:#444;line-height:1.6;margin:0 0 20px">
        הזן את הקוד הבא בעמוד ההתחברות כדי להיכנס לחשבונך:
      </p>

      <div style="background:#f0f6f6;border:1px solid #d7e8e8;border-radius:12px;padding:18px;text-align:center;margin-bottom:8px">
        <div style="font-size:13px;color:#7a8a8a;margin-bottom:6px">הקוד שלך</div>
        <div style="font-size:34px;font-weight:bold;letter-spacing:8px;color:#108c8b;direction:ltr">{{ .Token }}</div>
      </div>
      <p style="font-size:12px;color:#aaa;text-align:center;margin:0 0 18px">לחיצה ארוכה על הקוד (בנייד) מאפשרת להעתיק אותו.</p>

      <!-- Opens the site with the code already filled — one tap, no copy needed. -->
      <div style="text-align:center;margin-bottom:12px">
        <a href="{{ .SiteURL }}/login?email={{ .Email }}&otp={{ .Token }}" style="display:inline-block;background:#108c8b;color:#fff;text-decoration:none;font-weight:bold;font-size:15px;padding:13px 30px;border-radius:10px">
          התחברות עם הקוד ←
        </a>
      </div>
      <p style="font-size:13px;color:#999;text-align:center;margin:0 0 20px">
        או <a href="{{ .ConfirmationURL }}" style="color:#108c8b;font-weight:bold">התחברות בלחיצה ישירה</a>
      </p>

      <p style="font-size:13px;color:#999;line-height:1.6;text-align:center;margin:0">
        הקוד תקף לזמן מוגבל. אם לא ביקשת להתחבר — אפשר להתעלם מהמייל הזה.
      </p>
    </div>
    <div style="border-top:1px solid #eee;padding:14px;text-align:center;font-size:12px;color:#aaa">
      © ד״ר פון · כל הזכויות שמורות
    </div>
  </div>
</div>
