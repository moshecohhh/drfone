<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ד''ר פון - חנות מכשירים כשרים ומעבדה לתיקון סמארטפונים ברשבי 49, מודיעין עילית" />
    <title>ד''ר פון | חנות ומעבדה</title>
    <!-- Open Graph — rich link preview (WhatsApp, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ד''ר פון | חנות ומעבדה" />
    <meta property="og:description" content="חנות מכשירים כשרים ומעבדה לתיקון סמארטפונים — רשבי 49, מודיעין עילית" />
    <meta property="og:url" content="https://drfone.vercel.app" />
    <meta property="og:image" content="https://drfone.vercel.app/logo.png" />
    <meta property="og:locale" content="he_IL" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      try {
        var t = localStorage.getItem('drfone_theme')
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        if (t === 'dark') document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
